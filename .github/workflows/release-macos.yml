name: release-macos

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: macos-14
    env:
      CI: "true"
      CARGO_TERM_COLOR: always
      APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
      APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
      APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
      KEYCHAIN_PASSWORD: ${{ github.run_id }}-${{ github.run_attempt }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build app bundle
        run: pnpm tauri build -b app

      - name: Resolve release security mode
        run: |
          if [[ -n "${APPLE_CERTIFICATE}" && -n "${APPLE_CERTIFICATE_PASSWORD}" && -n "${APPLE_SIGNING_IDENTITY}" ]]; then
            echo "SIGNING_MODE=developer-id" >> "${GITHUB_ENV}"
          else
            echo "SIGNING_MODE=adhoc" >> "${GITHUB_ENV}"
          fi

          if [[ -n "${APPLE_ID}" && -n "${APPLE_TEAM_ID}" && -n "${APPLE_APP_SPECIFIC_PASSWORD}" ]]; then
            echo "NOTARIZE_ENABLED=true" >> "${GITHUB_ENV}"
          else
            echo "NOTARIZE_ENABLED=false" >> "${GITHUB_ENV}"
          fi

      - name: Locate app bundle
        run: |
          APP_BUNDLE="$(find src-tauri/target/release/bundle/macos -maxdepth 1 -name '*.app' -print -quit)"
          if [[ -z "${APP_BUNDLE}" ]]; then
            echo "Failed to locate .app bundle output."
            ls -R src-tauri/target/release/bundle || true
            exit 1
          fi
          echo "APP_BUNDLE=${APP_BUNDLE}" >> "${GITHUB_ENV}"

      - name: Import Apple certificate (optional)
        run: |
          if [[ "${SIGNING_MODE}" != "developer-id" ]]; then
            echo "No signing secrets found, using ad-hoc signature."
            exit 0
          fi

          CERT_PATH="${RUNNER_TEMP}/build_certificate.p12"
          KEYCHAIN_PATH="${RUNNER_TEMP}/build.keychain-db"
          echo "${APPLE_CERTIFICATE}" | base64 --decode > "${CERT_PATH}"

          security create-keychain -p "${KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}"
          security set-keychain-settings -lut 21600 "${KEYCHAIN_PATH}"
          security unlock-keychain -p "${KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}"
          security import "${CERT_PATH}" -P "${APPLE_CERTIFICATE_PASSWORD}" -A -f pkcs12 -k "${KEYCHAIN_PATH}"
          security list-keychains -d user -s "${KEYCHAIN_PATH}"
          security default-keychain -d user -s "${KEYCHAIN_PATH}"
          security set-key-partition-list -S apple-tool:,apple: -s -k "${KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}"
          echo "KEYCHAIN_PATH=${KEYCHAIN_PATH}" >> "${GITHUB_ENV}"

      - name: Sign app bundle
        run: |
          if [[ "${SIGNING_MODE}" == "developer-id" ]]; then
            codesign --force --deep --options runtime --timestamp --sign "${APPLE_SIGNING_IDENTITY}" "${APP_BUNDLE}"
          else
            # Ad-hoc signing keeps the bundle internally consistent when cert secrets are absent.
            codesign --force --deep --sign - "${APP_BUNDLE}"
          fi

      - name: Verify app signature
        run: |
          codesign --verify --deep --strict --verbose=2 "${APP_BUNDLE}"
          codesign -dv --verbose=4 "${APP_BUNDLE}" 2>&1 | sed -n '1,60p'

      - name: Notarize and staple app (optional)
        run: |
          if [[ "${SIGNING_MODE}" != "developer-id" || "${NOTARIZE_ENABLED}" != "true" ]]; then
            echo "Skipping app notarization."
            exit 0
          fi

          xcrun notarytool submit "${APP_BUNDLE}" \
            --apple-id "${APPLE_ID}" \
            --password "${APPLE_APP_SPECIFIC_PASSWORD}" \
            --team-id "${APPLE_TEAM_ID}" \
            --wait

          xcrun stapler staple "${APP_BUNDLE}"

      - name: Prepare release assets
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          OUT_DIR="releases/${TAG}"
          mkdir -p "${OUT_DIR}"

          ZIP_OUT="${OUT_DIR}/PasteMind_${VERSION}_macos_aarch64.app.zip"
          DMG_OUT="${OUT_DIR}/PasteMind_${VERSION}_macos_aarch64.dmg"

          ditto -c -k --sequesterRsrc --keepParent \
            "${APP_BUNDLE}" \
            "${ZIP_OUT}"

          hdiutil create \
            -volname "PasteMind" \
            -srcfolder "${APP_BUNDLE}" \
            -ov \
            -format UDZO \
            "${DMG_OUT}"

          if [[ "${SIGNING_MODE}" == "developer-id" ]]; then
            codesign --force --timestamp --sign "${APPLE_SIGNING_IDENTITY}" "${DMG_OUT}"
          fi

          if [[ "${SIGNING_MODE}" == "developer-id" && "${NOTARIZE_ENABLED}" == "true" ]]; then
            xcrun notarytool submit "${DMG_OUT}" \
              --apple-id "${APPLE_ID}" \
              --password "${APPLE_APP_SPECIFIC_PASSWORD}" \
              --team-id "${APPLE_TEAM_ID}" \
              --wait
            xcrun stapler staple "${DMG_OUT}"
          fi

          shasum -a 256 \
            "${ZIP_OUT}" \
            "${DMG_OUT}" \
            > "${OUT_DIR}/SHA256SUMS.txt"

          {
            echo "# PasteMind ${TAG}"
            echo
            echo "Release date: $(date -u +"%Y-%m-%d")"
            echo
            echo "Signing mode: ${SIGNING_MODE}"
            echo "Notarized: ${NOTARIZE_ENABLED}"
            echo
            echo "## Downloads"
            echo
            echo "- PasteMind_${VERSION}_macos_aarch64.dmg"
            echo "- PasteMind_${VERSION}_macos_aarch64.app.zip"
            echo "- SHA256SUMS.txt"
            echo
            echo "## Highlights"
            echo
            echo "- Local-first clipboard manager for macOS 13+ (Apple Silicon)"
            echo "- Menu bar app with global hotkey"
            echo "- Text and image clipboard history"
            echo "- Click text/image content to paste immediately"
            echo "- Custom hotkey recording, including F1-F24 support"
            echo "- Bilingual UI (Chinese / English)"
            echo "- Privacy-first: no cloud upload"
          } > "${OUT_DIR}/RELEASE_NOTES.md"

      - name: Cleanup temporary keychain
        if: always()
        run: |
          if [[ -n "${KEYCHAIN_PATH:-}" && -f "${KEYCHAIN_PATH}" ]]; then
            security delete-keychain "${KEYCHAIN_PATH}" || true
          fi

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: PasteMind ${{ github.ref_name }}
          body: |
            PasteMind release for macOS (Apple Silicon).

            Download:
            - DMG installer
            - App ZIP package
            - SHA256 checksum file
          files: |
            releases/${{ github.ref_name }}/PasteMind_*_macos_aarch64.dmg
            releases/${{ github.ref_name }}/PasteMind_*_macos_aarch64.app.zip
            releases/${{ github.ref_name }}/SHA256SUMS.txt
            releases/${{ github.ref_name }}/RELEASE_NOTES.md
